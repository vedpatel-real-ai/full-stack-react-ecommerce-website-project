<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic Meta Tags -->
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>NovaCommerce | Portfolio Demo Marketplace</title>
  <meta name="description" content="NovaCommerce is a self-contained ecommerce portfolio demo with fictional products and simulated checkout." />
  <meta name="author" content="NovaCommerce Demo" />
  <meta name="theme-color" content="#000000" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://novacommerce-demo.example/" />

  <!-- Favicon and Touch Icons -->
  <link rel="icon" type="image/svg+xml" href="/demo-product.svg" />
  <link rel="apple-touch-icon" href="/logo192.png" />

  <!-- Preload Logo for LCP -->
  <link rel="preload" href="/demo-product.svg" as="image">

  <!-- Manifest for PWA -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="NovaCommerce | Portfolio Demo Marketplace" />
  <meta property="og:description" content="Explore fictional products, cart flows, admin screens, and simulated checkout." />
  <meta property="og:image" content="/demo-product.svg" />
  <meta property="og:url" content="https://novacommerce-demo.example/" />
  <meta property="og:site_name" content="NovaCommerce" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NovaCommerce | Portfolio Demo Marketplace" />
  <meta name="twitter:description" content="Discover a self-contained ecommerce demo with no live backend or payment gateway." />
  <meta name="twitter:image" content="/demo-product.svg" />
  <meta name="twitter:site" content="@novacommerce_demo" />
  <meta name="twitter:creator" content="@novacommerce_demo" />
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
